syntax = "proto3";

package creo_sync;

// === Control Plane ===

message Subscribe {
  string category = 1;
  string tags = 2;
}

message Ack {
  string status = 1;
  string channel_ref = 2;
}

// === Data Plane ===

message MemoryEvent {
  string event_type = 1;
  string memory_id = 2;
  string category = 3;
  string from = 4;
  string timestamp = 5;
}

message Query {
  string method = 1;
  bytes params = 2;
}

message QueryResult {
  bytes data = 1;
}

message QueryError {
  string code = 1;
  string message = 2;
}

// === Messaging Plane ===

message SendMessage {
  string from = 1;
  string to = 2;
  string content = 3;
  string thread = 4;
}

message MessageAck {
  string status = 1;
}

message CCMessage {
  string from = 1;
  string to = 2;
  string content = 3;
  string thread = 4;
}

// === Urgent Plane ===

message Alert {
  string level = 1;
  string title = 2;
  string body = 3;
}
